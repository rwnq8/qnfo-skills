<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QNFO Publications — Research Library</title>
<meta name="description" content="Complete QNFO research library: 170 papers, 124+ DOIs, AI-powered search.">
<meta name="theme-color" content="#0a0a0f">
<style>
:root{--bg:#0a0a0f;--surf:#12121a;--text:#e4e4ed;--muted:#8b8b9e;--acc:#6366f1;--acc-hover:#818cf8;--bd:#252532;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--zen:#2c6fbb;--zen-glow:rgba(44,111,187,0.15);--radius:8px;--font:system-ui,-apple-system,sans-serif;--mono:"JetBrains Mono",monospace}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);line-height:1.6;min-height:100vh}
.shell{max-width:1200px;margin:0 auto;padding:1.5rem}
/* Header */
.hdr{padding:2rem 0 1.5rem;border-bottom:1px solid var(--bd);margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:1rem}
.hdr h1{font-size:1.8rem;font-weight:700;letter-spacing:-0.02em}
.hdr h1 span{background:linear-gradient(135deg,#818cf8,var(--acc));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr .sub{color:var(--muted);font-size:.9rem}
/* Nav */
.nav{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--bd)}
.nav a{color:var(--muted);text-decoration:none;font-size:.85rem;padding:.3rem .7rem;border-radius:4px;transition:all .15s}
.nav a:hover,.nav a.on{color:var(--acc);background:rgba(99,102,241,.1)}
.nav a.on{font-weight:600}
/* Stats Bar */
.stats{display:flex;gap:2rem;flex-wrap:wrap;margin-bottom:2rem;padding:1rem 1.5rem;background:var(--surf);border:1px solid var(--bd);border-radius:var(--radius)}
.stat{text-align:center}
.stat .v{font-size:1.5rem;font-weight:700;color:var(--acc)}
.stat .l{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
/* Search */
.search{display:flex;gap:.75rem;margin-bottom:1.5rem}
.search input{flex:1;min-width:200px;padding:.75rem 1rem;background:var(--surf);border:1px solid var(--bd);border-radius:var(--radius);color:var(--text);font-size:.9rem}
.search input:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px rgba(99,102,241,.15)}
.search button{padding:.75rem 1.5rem;background:var(--acc);border:none;border-radius:var(--radius);color:#fff;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .15s}
.search button:hover{background:var(--acc-hover)}
.search .ai-btn{background:transparent;border:1px solid var(--acc);color:var(--acc)}
.search .ai-btn:hover{background:rgba(99,102,241,.1)}
/* Tags */
.tags{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.5rem}
.tag{padding:.25rem .65rem;border-radius:4px;font-size:.75rem;cursor:pointer;transition:all .15s;border:1px solid var(--bd);color:var(--muted)}
.tag:hover,.tag.on{background:rgba(99,102,241,.12);border-color:var(--acc);color:var(--acc)}
/* Papers Grid */
.grid{display:grid;gap:1rem}
.card{background:var(--surf);border:1px solid var(--bd);border-radius:var(--radius);padding:1.3rem;transition:all .15s;cursor:pointer}
.card:hover{border-color:var(--acc);box-shadow:0 4px 20px rgba(99,102,241,.1)}
.card h3{font-size:1.05rem;font-weight:600;color:var(--text);margin-bottom:.3rem;line-height:1.4}
.card .authors{color:var(--muted);font-size:.82rem;margin-bottom:.5rem}
.card .preview{color:var(--muted);font-size:.82rem;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .meta{display:flex;gap:.75rem;flex-wrap:wrap;margin-top:.6rem;font-size:.75rem;align-items:center}
.doi-badge{display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .55rem;background:var(--zen-glow);border:1px solid rgba(44,111,187,.3);border-radius:4px;color:#6ba3d6;font-size:.72rem;text-decoration:none;white-space:nowrap;font-family:var(--mono)}
.doi-badge:hover{border-color:#4a8fd4;color:#8ec5f7}
/* Detail Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);z-index:100;overflow-y:auto;padding:2rem}
.modal-overlay.open{display:block}
.modal{max-width:900px;margin:0 auto;background:var(--surf);border:1px solid var(--bd);border-radius:var(--radius);padding:2rem}
.modal h2{font-size:1.5rem;font-weight:700;margin-bottom:.5rem;line-height:1.4}
.modal .m-meta{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--bd);font-size:.85rem;color:var(--muted)}
.modal .m-body{font-size:.95rem;line-height:1.8;color:var(--text);white-space:pre-wrap;font-family:var(--font)}
.modal .m-body h1,.modal .m-body h2,.modal .m-body h3{font-size:1.1rem;font-weight:600;margin:1.5rem 0 .5rem;color:var(--acc)}
.modal .close{position:sticky;top:1rem;float:right;background:var(--surf);border:1px solid var(--bd);color:var(--muted);padding:.4rem 1rem;border-radius:var(--radius);cursor:pointer;font-size:.85rem;z-index:10}
.modal .close:hover{color:var(--text);border-color:var(--acc)}
/* AI Panel */
.ai-panel{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surf);border-top:2px solid var(--acc);z-index:200;padding:1.5rem;max-height:40vh;overflow-y:auto}
.ai-panel.open{display:block}
.ai-panel .ai-close{float:right;background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.2rem}
.ai-panel h4{font-size:1rem;font-weight:600;margin-bottom:.75rem;color:var(--acc)}
.ai-panel textarea{width:100%;padding:.75rem;background:var(--bg);border:1px solid var(--bd);border-radius:var(--radius);color:var(--text);font-size:.9rem;min-height:60px;resize:vertical;margin-bottom:.75rem}
.ai-panel .ai-answer{margin-top:1rem;padding:1rem;background:var(--bg);border:1px solid var(--bd);border-radius:var(--radius);font-size:.9rem;line-height:1.7;color:var(--text);white-space:pre-wrap}
.ai-panel .ai-sources{font-size:.75rem;color:var(--muted);margin-top:.5rem}
.loading{padding:3rem;text-align:center;color:var(--muted)}
.error{padding:2rem;text-align:center;color:var(--red);border:1px solid rgba(239,68,68,.3);border-radius:var(--radius)}
footer{margin-top:3rem;padding:1.5rem 0;border-top:1px solid var(--bd);text-align:center;color:var(--muted);font-size:.8rem}
footer a{color:var(--muted);text-decoration:none;margin:0 .5rem}
footer a:hover{color:var(--acc)}
</style>
</head>
<body>
<div class="shell">
  <div class="hdr">
    <div>
      <h1>QNFO <span>Publications</span></h1>
      <p class="sub">Complete research library · 170 papers · 124+ DOIs · AI search</p>
    </div>
  </div>
  <nav class="nav">
    <a href="https://qnfo.org">Hub</a>
    <a href="https://papers.qnfo.org" class="on">Papers</a>
    <a href="https://laws.qnfo.org">Laws of Form</a>
    <a href="https://legal.qnfo.org">Legal</a>
  </nav>

  <div class="stats" id="stats">
    <div class="stat"><div class="v" id="stat-total">—</div><div class="l">Papers</div></div>
    <div class="stat"><div class="v" id="stat-doi">—</div><div class="l">DOIs</div></div>
    <div class="stat"><div class="v" id="stat-vec">—</div><div class="l">Vectorize</div></div>
  </div>

  <div class="search">
    <input type="text" id="search-input" placeholder="Search 170 papers by title, author, or concept…" onkeydown="if(event.key==='Enter')search()">
    <button onclick="search()">Search</button>
    <button class="ai-btn" onclick="toggleAI()">🤖 Ask AI</button>
  </div>

  <div class="tags" id="tags"></div>
  <div class="grid" id="papers-grid"><div class="loading">Loading papers…</div></div>
</div>

<!-- Paper Detail Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

<!-- AI Panel -->
<div class="ai-panel" id="ai-panel">
  <button class="ai-close" onclick="toggleAI()">✕</button>
  <h4>🤖 Ask QWAV — AI Research Synthesis</h4>
  <textarea id="ai-question" placeholder="Ask a question about the research corpus…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();askAI()}"></textarea>
  <button onclick="askAI()" style="background:var(--acc);border:none;color:#fff;padding:.5rem 1.2rem;border-radius:var(--radius);cursor:pointer;font-weight:600">Ask</button>
  <div class="ai-answer" id="ai-answer" style="display:none"></div>
  <div class="ai-sources" id="ai-sources"></div>
</div>

<footer>
  <p><a href="https://qnfo.org">Hub</a> · <a href="https://legal.qnfo.org">License</a> · <a href="https://api-gateway.q08.workers.dev">API</a></p>
  <p style="margin-top:.5rem">QNFO Research Platform · 170 papers · &copy; 2026</p>
</footer>

<script>
var API = 'https://ask-qwav.q08.workers.dev';
var allPapers = [];
var currentFilters = {};

// Load papers
async function loadPapers() {
  var grid = document.getElementById('papers-grid');
  grid.innerHTML = '<div class="loading">Loading 170 papers…</div>';
  
  try {
    // Fetch all papers in 2 pages (API caps at 100)
    var all = [];
    for (var off = 0; off < 170; off += 100) {
      var r = await fetch(API + '/api/papers?limit=100&offset=' + off);
      var d = await r.json();
      if (d.success) all = all.concat(d.data);
    }
    allPapers = all;
    
    // Load stats
    var s = await fetch(API + '/api/stats');
    var sd = await s.json();
    if (sd.success) {
      document.getElementById('stat-total').textContent = sd.stats.total_papers;
      document.getElementById('stat-doi').textContent = sd.stats.with_doi;
    }
    var h = await fetch(API + '/api/health');
    var hd = await h.json();
    if (hd.vectorize) {
      document.getElementById('stat-vec').textContent = hd.vectorize.match(/vectors=(\d+)/)?.[1] || '—';
    }
    
    renderCards(all);
  } catch(e) {
    grid.innerHTML = '<div class="error">Failed to load papers: ' + e.message + '</div>';
  }
}

function renderCards(papers) {
  var grid = document.getElementById('papers-grid');
  if (!papers.length) { grid.innerHTML = '<div class="loading">No papers found</div>'; return; }
  
  var html = '';
  papers.forEach(function(p) {
    var title = (p.title || 'Untitled').substring(0, 120);
    var authors = parseAuthors(p.authors).join(', ').substring(0, 80);
    var preview = stripYaml(p.abstract || '').substring(0, 200);
    var doi = p.doi || '';
    var id = p.id;
    
    html += '<div class="card" onclick="openPaper(\'' + id + '\')">' +
      '<h3>' + esc(title) + '</h3>' +
      '<div class="authors">' + esc(authors || 'QNFO Research Collective') + '</div>' +
      '<div class="preview">' + esc(preview) + '</div>' +
      '<div class="meta">' +
        (doi ? '<a class="doi-badge" href="https://doi.org/' + doi + '" onclick="event.stopPropagation()" target="_blank">DOI:' + esc(doi.substring(doi.lastIndexOf('/')+1)) + '</a>' : '') +
        '<span style="color:var(--muted)">' + id.substring(0,8) + '</span>' +
      '</div>' +
    '</div>';
  });
  grid.innerHTML = html;
}

// Paper detail
async function openPaper(id) {
  var modal = document.getElementById('modal-overlay');
  var content = document.getElementById('modal-content');
  modal.classList.add('open');
  content.innerHTML = '<div class="loading">Loading paper…</div>';
  
  try {
    var r = await fetch(API + '/api/papers/' + id);
    var d = await r.json();
    if (!d.success) { content.innerHTML = '<div class="error">Paper not found</div>'; return; }
    var p = d.paper;
    // Store in paper cache and window for AI access
    paperCache[id] = p;
    window.__currentPaper = p;
    window.__currentPaperId = id;
    var body = stripYaml(p.body_md || p.abstract || '');
    var authors = parseAuthors(p.authors).join(', ');
    var doi = p.doi || '';
    
    content.innerHTML = 
      '<button class="close" onclick="closeModal()">✕ Close</button>' +
      '<h2>' + esc(p.title || 'Untitled') + '</h2>' +
      '<div class="m-meta">' +
        '<span>👤 ' + esc(authors || 'QNFO Research Collective') + '</span>' +
        (doi ? '<a class="doi-badge" href="https://doi.org/' + doi + '" target="_blank">🔗 ' + doi + '</a>' : '') +
        '<span>🆔 ' + esc(p.id) + '</span>' +
      '</div>' +
      '<div class="m-body">' + esc(body).substring(0, 15000) + '</div>' +
      '<div class="m-ai" style="margin-top:1.5rem;padding:1.2rem;background:var(--bg);border:1px solid var(--bd);border-radius:var(--radius)">' +
        '<h4 style="color:var(--acc);margin-bottom:.5rem">🤖 Ask AI about this paper</h4>' +
        '<div style="display:flex;gap:.5rem;margin-bottom:.75rem">' +
          '<button onclick="askPaperAI(\'' + id + '\',\'paper\')" style="padding:.5rem 1rem;background:var(--acc);border:none;border-radius:4px;color:#fff;font-size:.85rem;cursor:pointer;font-weight:600">Ask about this paper</button>' +
          '<button onclick="askPaperAI(\'' + id + '\',\'corpus\')" style="padding:.5rem 1rem;background:transparent;border:1px solid var(--acc);border-radius:4px;color:var(--acc);font-size:.85rem;cursor:pointer">Ask the corpus</button>' +
        '</div>' +
        '<textarea id="m-ai-input" placeholder="What does this paper say about..." style="width:100%;padding:.6rem;background:var(--surf);border:1px solid var(--bd);border-radius:4px;color:var(--text);font-size:.85rem;min-height:50px;resize:vertical" onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();askPaperAI(\'' + id + '\',\'paper\')}"></textarea>' +
        '<div id="m-ai-answer" style="display:none;margin-top:.75rem;padding:.75rem;background:var(--surf);border:1px solid var(--bd);border-radius:4px;font-size:.85rem;line-height:1.7;color:var(--text);white-space:pre-wrap"></div>' +
        '<div id="m-ai-sources" style="font-size:.7rem;color:var(--muted);margin-top:.35rem"></div>' +
      '</div>';
    
    // Related papers
    if (d.related_papers && d.related_papers.length) {
      content.innerHTML += '<div style="margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--bd)"><h4 style="color:var(--acc);margin-bottom:.5rem">Related Papers</h4>' +
        d.related_papers.map(function(rp){ return '<div style="color:var(--muted);font-size:.85rem;padding:.25rem 0">' + esc(rp) + '</div>'; }).join('') + '</div>';
    }
    
  } catch(e) {
    content.innerHTML = '<div class="error">Error: ' + e.message + '</div>';
  }
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

// ── Per-paper AI synthesis ──
var paperCache = {};

async function askPaperAI(paperId, mode) {
  var input = document.getElementById('m-ai-input');
  var ans = document.getElementById('m-ai-answer');
  var src = document.getElementById('m-ai-sources');
  var q = input.value.trim();
  if (!q) return;
  
  ans.style.display = 'block';
  ans.textContent = 'Thinking…';
  src.textContent = '';
  
  try {
    var fullQ = q;
    if (mode === 'paper') {
      // Use cached paper data (set by openPaper)
      var p = paperCache[paperId] || window.__currentPaper;
      if (!p) {
        try {
          var r = await fetch(API + '/api/papers/' + paperId);
          var d = await r.json();
          if (d.success) { paperCache[paperId] = d.paper; p = d.paper; }
        } catch(e) {}
      }
      if (p) {
        var body = stripYaml(p.body_md || p.abstract || '').substring(0, 3000);
        fullQ = 'Context: Paper titled "' + p.title + '" by ' + parseAuthors(p.authors).join(', ') + '.\n\n' + body + '\n\nQuestion: ' + q + '\n\nAnswer concisely based on the paper context above. Be factual.';
      }
    }
    // mode === 'corpus' uses Vectorize search (no paper context prepended)
    
    var resp = await fetch(API + '/api/ask?q=' + encodeURIComponent(fullQ.substring(0, 4000)));
    var data = await resp.json();
    if (data.success) {
      ans.textContent = data.answer;
      src.textContent = 'Mode: ' + (mode === 'paper' ? 'paper-specific' : 'corpus-wide') + (data.papers ? ' · ' + data.papers + ' papers' : '');
    } else {
      ans.textContent = 'AI unavailable: ' + (data.error || 'try again');
    }
  } catch(e) {
    ans.textContent = 'Error: ' + e.message;
  }
}

// ── Hash-based navigation (from hub links) ──
async function openPaperFromHash() {
  var hash = window.location.hash;
  var m = hash.match(/^#paper=([a-f0-9]+)$/);
  if (!m) return;
  await openPaper(m[1]);
}

// ── Load papers + check hash ──
async function initPapers() {
  await loadPapers();
  // Auto-open paper if hash is present (from hub navigation)
  if (window.location.hash.startsWith('#paper=')) {
    await openPaperFromHash();
  }
}

// Listen for hash changes (back/forward navigation)
window.addEventListener('hashchange', openPaperFromHash);

// Init
initPapers();

// Search (with debounce)
var searchTimeout;
document.getElementById('search-input').addEventListener('input', function() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(search, 300);
});

function search() {
  var q = document.getElementById('search-input').value.toLowerCase().trim();
  if (!q) { renderCards(allPapers); return; }
  
  var filtered = allPapers.filter(function(p) {
    var title = (p.title || '').toLowerCase();
    var abs = (p.abstract || '').toLowerCase();
    return title.indexOf(q) >= 0 || abs.indexOf(q) >= 0;
  });
  renderCards(filtered);
}

// AI Panel
function toggleAI() {
  document.getElementById('ai-panel').classList.toggle('open');
}

async function askAI() {
  var q = document.getElementById('ai-question').value.trim();
  if (!q) return;
  
  var ans = document.getElementById('ai-answer');
  ans.style.display = 'block';
  ans.textContent = 'Thinking…';
  
  try {
    var r = await fetch(API + '/api/ask?q=' + encodeURIComponent(q));
    var d = await r.json();
    if (d.success) {
      ans.textContent = d.answer;
      if (d.papers) {
        document.getElementById('ai-sources').textContent = 'Based on ' + d.papers + ' papers';
      }
    } else {
      ans.textContent = 'Error: ' + (d.error || 'Unknown');
    }
  } catch(e) {
    ans.textContent = 'AI unavailable: ' + e.message;
  }
}

// Helpers
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function parseAuthors(a) { try { var p = JSON.parse(a); return Array.isArray(p) ? p : [String(p)]; } catch(e) { return [a||'QNFO Research Collective']; } }
function stripYaml(text) { if (!text) return ''; var idx = text.indexOf('---', 3); return idx >= 0 ? text.substring(idx + 3).trim() : text; }

// Load on init — handled by initPapers() above
</script>
</body>
</html>
