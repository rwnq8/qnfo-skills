<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QNFO Research Hub</title>
<meta name="description" content="QNFO is the research infrastructure behind QWAV — ultrametric quantum computing, quantum laws of form, p-adic physics, and the unified research library.">
<meta name="theme-color" content="#0a0a0f">
<meta name="qnfo-site-id" content="hub">
<meta name="keywords" content="QNFO, research infrastructure, ultrametric, quantum computing, p-adic, physics">
<meta property="og:title" content="QNFO — Research Infrastructure">
<meta property="og:description" content="QNFO is the research infrastructure behind QWAV — ultrametric quantum computing, quantum laws of form, p-adic physics, and the unified research library.">
<meta property="og:image" content="https://qnfo.org/qnfo.org.png">
<meta property="og:url" content="https://qnfo.org/">
<meta property="og:type" content="website">
<meta property="og:site_name" content="QNFO Research">
<meta name="twitter:card" content="summary_large_image">
<script src="/qnfo-cms-client.js"></script>
<style>
:root{--bg:#0a0a0f;--surf:#12121a;--text:#e4e4ed;--muted:#8b8b9e;--acc:#6366f1;--bd:#252532;--font:system-ui,-apple-system,sans-serif}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);line-height:1.6;min-height:100vh}
.shell{max-width:1100px;margin:0 auto;padding:2rem 1.5rem}
.shell hdr{padding:2rem 0 1.5rem;border-bottom:1px solid var(--bd);margin-bottom:2rem;display:block}
.shell hdr h1{font-size:2rem;font-weight:700;letter-spacing:-0.02em}
.shell hdr h1 s{background:linear-gradient(135deg,var(--acc),#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-style:normal}
.shell hdr .sub{color:var(--muted);font-size:.95rem;margin-top:.25rem}
.shell nav{display:flex;gap:1.2rem;flex-wrap:wrap;margin-bottom:2rem;padding-bottom:1rem;border-bottom:1px solid var(--bd)}
.shell nav a{color:var(--muted);text-decoration:none;font-size:.9rem;padding:.3rem .6rem;border-radius:4px;transition:all .15s}
.shell nav a:hover,.shell nav a.on{color:var(--acc);background:rgba(99,102,241,.1)}
.shell nav a.on{font-weight:600}
.shell footer{margin-top:4rem;padding:2rem 0;border-top:1px solid var(--bd);text-align:center;color:var(--muted);font-size:.85rem}
.shell footer a{color:var(--muted);text-decoration:none;margin:0 .5rem}
.shell footer a:hover{color:var(--acc)}
#qds-status{display:inline-block;padding:.2rem .7rem;border-radius:4px;font-size:.8rem;margin-left:.5rem}
.qds-status-loading{background:rgba(99,102,241,.12);color:var(--acc)}
.qds-status-ok{background:rgba(34,197,94,.12);color:#22c55e}
.qds-status-error{background:rgba(239,68,68,.12);color:#ef4444}
</style>
</head>
<body>
<div class="shell">
  <hdr>
    <h1>QNFO <s>Research Hub</s></h1>
    <p class="sub">Ultrametric quantum computing · p-Adic physics · Quantum Laws of Form <span id="qds-status" class="qds-status-loading">Loading</span></p>
  </hdr>
  <nav>
    <a href="https://qnfo.org" class="on">Hub</a>
    <a href="https://papers.qnfo.org">Papers</a>
    <a href="https://laws.qnfo.org">Laws of Form</a>
    <a href="https://legal.qnfo.org">Legal</a>
  </nav>
  <main data-cms-content="hub"></main>
  <footer>
    <p><a href="https://papers.qnfo.org">All Publications</a> · <a href="https://legal.qnfo.org">License</a> · <a href="https://api-gateway.q08.workers.dev">API</a></p>
    <p style="margin-top:.75rem">QNFO Research Platform · Powered by CMS API · &copy; 2026</p>
  </footer>
</div>
</body>
</html>
