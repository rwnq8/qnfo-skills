<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Living Papers — QNFO Research Archive</title>
<style>
:root {
  --bg: #0a0a0f;
  --card: #12121a;
  --border: #1e1e2e;
  --text: #e0e0e8;
  --muted: #8888a0;
  --accent: #6366f1;
  --accent-glow: rgba(99, 102, 241, 0.15);
  --zenodo: #2c6fbb;
  --zenodo-glow: rgba(44, 111, 187, 0.15);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, sans-serif;
  line-height: 1.6;
  min-height: 100vh;
}

/* Header */
.header {
  background: linear-gradient(135deg, var(--accent-glow), transparent);
  border-bottom: 1px solid var(--border);
  padding: 3rem 2rem 2rem;
  text-align: center;
}

.header h1 {
  font-size: 2.2rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, #818cf8, #6366f1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 0.5rem;
}

.header p {
  color: var(--muted);
  font-size: 1.1rem;
}

/* Stats bar */
.stats-bar {
  display: flex;
  justify-content: center;
  gap: 2rem;
  padding: 1.5rem;
  flex-wrap: wrap;
}

.stat {
  text-align: center;
}

.stat-value {
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--accent);
}

.stat-label {
  font-size: 0.85rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.stat.zenodo .stat-value { color: var(--zenodo); }

/* Container */
.container {
  max-width: 1000px;
  margin: 0 auto;
  padding: 0 1.5rem 3rem;
}

/* Controls */
.controls {
  display: flex;
  gap: 1rem;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
  align-items: center;
}

.controls input {
  flex: 1;
  min-width: 200px;
  padding: 0.7rem 1rem;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 0.95rem;
}

.controls input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.controls button {
  padding: 0.7rem 1.4rem;
  background: var(--accent);
  border: none;
  border-radius: 8px;
  color: white;
  font-size: 0.95rem;
  cursor: pointer;
  transition: all 0.2s;
}

.controls button:hover {
  opacity: 0.9;
  transform: translateY(-1px);
}

.filter-btn {
  background: var(--card) !important;
  border: 1px solid var(--border) !important;
  color: var(--text) !important;
}

.filter-btn.active {
  background: var(--accent) !important;
  border-color: var(--accent) !important;
  color: white !important;
}

/* Paper cards */
.papers-grid {
  display: grid;
  gap: 1rem;
}

.paper-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.3rem;
  transition: all 0.2s;
}

.paper-card:hover {
  border-color: var(--accent);
  box-shadow: 0 4px 20px var(--accent-glow);
}

.paper-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 1rem;
  margin-bottom: 0.5rem;
}

.paper-title {
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--text);
  text-decoration: none;
  line-height: 1.4;
}

.paper-title:hover {
  color: var(--accent);
}

.paper-authors {
  color: var(--muted);
  font-size: 0.9rem;
  margin-bottom: 0.4rem;
}

.paper-abstract {
  color: var(--muted);
  font-size: 0.85rem;
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.paper-meta {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
  margin-top: 0.6rem;
  font-size: 0.8rem;
  color: var(--muted);
}

/* DOI Badge */
.doi-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.3rem 0.7rem;
  background: var(--zenodo-glow);
  border: 1px solid rgba(44, 111, 187, 0.3);
  border-radius: 6px;
  color: #6ba3d6;
  font-size: 0.8rem;
  text-decoration: none;
  white-space: nowrap;
  transition: all 0.2s;
  flex-shrink: 0;
}

.doi-badge:hover {
  background: rgba(44, 111, 187, 0.25);
  border-color: #4a8fd4;
  color: #8ec5f7;
}

.doi-badge svg {
  width: 14px;
  height: 14px;
  flex-shrink: 0;
}

.doi-icon-text {
  font-weight: 600;
  letter-spacing: 0.02em;
}

/* Zenodo section */
.zenodo-section {
  margin: 2rem 0;
}

.zenodo-section h2 {
  font-size: 1.3rem;
  margin-bottom: 1rem;
  color: var(--text);
}

.zenodo-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.2rem;
  margin-bottom: 0.8rem;
  transition: all 0.2s;
}

.zenodo-card:hover {
  border-color: var(--zenodo);
  box-shadow: 0 4px 20px var(--zenodo-glow);
}

.zenodo-card .zenodo-title {
  font-weight: 600;
  color: var(--text);
  margin-bottom: 0.3rem;
}

.zenodo-card .zenodo-link {
  color: var(--zenodo);
  text-decoration: none;
  font-size: 0.9rem;
}

.zenodo-card .zenodo-link:hover {
  text-decoration: underline;
}

.zenodo-card .zenodo-count {
  color: var(--muted);
  font-size: 0.8rem;
}

/* Loading & Empty */
.loading {
  text-align: center;
  padding: 3rem;
  color: var(--muted);
}

.empty {
  text-align: center;
  padding: 3rem;
  color: var(--muted);
  font-size: 1.1rem;
}

/* Footer */
.footer {
  text-align: center;
  padding: 2rem;
  color: var(--muted);
  font-size: 0.85rem;
  border-top: 1px solid var(--border);
}
</style>
</head>
<body>

<div class="header">
  <h1>Living Papers</h1>
  <p>QNFO Research Archive — with Zenodo DOI Cross-Referencing</p>
</div>

<div class="stats-bar" id="stats">
  <div class="stat">
    <div class="stat-value" id="totalPapers">—</div>
    <div class="stat-label">Papers</div>
  </div>
  <div class="stat zenodo">
    <div class="stat-value" id="doiPapers">—</div>
    <div class="stat-label">With DOI</div>
  </div>
  <div class="stat zenodo">
    <div class="stat-value" id="uniqueDois">—</div>
    <div class="stat-label">Zenodo Publications</div>
  </div>
</div>

<div class="container">

  <!-- Controls -->
  <div class="controls">
    <input type="text" id="searchInput" placeholder="Search papers by title..." oninput="searchPapers()">
    <button class="filter-btn active" id="btnAll" onclick="setFilter('all')">All Papers</button>
    <button class="filter-btn" id="btnDoi" onclick="setFilter('doi')">DOI Papers</button>
    <button class="filter-btn" id="btnZenodo" onclick="setFilter('zenodo')">Zenodo Publications</button>
  </div>

  <!-- Papers Grid -->
  <div id="papersGrid" class="papers-grid"></div>

  <!-- Zenodo Publications -->
  <div id="zenodoSection" class="zenodo-section" style="display:none;">
    <h2>Zenodo Publications</h2>
    <div id="zenodoList"></div>
  </div>

  <div id="pagination" style="text-align:center; margin-top:1.5rem;"></div>
</div>

<div class="footer">
  <p>All papers authored by Rowan Brad Quni-Gudzinas | <a href="https://qnfo.org" style="color:var(--accent)">QNFO</a> | DOI records via <a href="https://zenodo.org" style="color:var(--zenodo)">Zenodo</a></p>
</div>

<script>
const API = 'https://living-papers-api.q08.workers.dev';
let currentFilter = 'all';
let currentOffset = 0;
const LIMIT = 50;

// DOI Badge SVG
function doiBadgeHTML(doi, zenodoUrl) {
  return `<a href="${zenodoUrl}" target="_blank" class="doi-badge" title="View on Zenodo">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15l-5-5 1.41-1.41L11 14.17l7.59-7.59L20 8l-9 9z"/></svg>
    <span class="doi-icon-text">DOI</span>
  </a>`;
}

// Authors display
function authorNames(authorsStr) {
  try {
    const authors = JSON.parse(authorsStr || '[]');
    return authors.map(a => a.name || a).join(', ') || 'Rowan Brad Quni-Gudzinas';
  } catch {
    return 'Rowan Brad Quni-Gudzinas';
  }
}

// Fetch stats
async function loadStats() {
  try {
    const r = await fetch(`${API}/api/stats`);
    const data = await r.json();
    document.getElementById('totalPapers').textContent = data.total_papers;
    document.getElementById('doiPapers').textContent = data.papers_with_doi;
    document.getElementById('uniqueDois').textContent = data.unique_dois;
  } catch (err) {
    console.error('Stats error:', err);
  }
}

// Search
function searchPapers() {
  currentOffset = 0;
  loadPapers();
}

// Filter
function setFilter(filter) {
  currentFilter = filter;
  currentOffset = 0;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`btn${filter.charAt(0).toUpperCase() + filter.slice(1)}`).classList.add('active');
  
  document.getElementById('papersGrid').style.display = filter === 'zenodo' ? 'none' : '';
  document.getElementById('zenodoSection').style.display = filter === 'zenodo' ? '' : 'none';
  document.getElementById('pagination').style.display = filter === 'zenodo' ? 'none' : '';
  
  if (filter === 'zenodo') {
    loadZenodo();
  } else {
    loadPapers();
  }
}

// Load papers
async function loadPapers() {
  const grid = document.getElementById('papersGrid');
  grid.innerHTML = '<div class="loading">Loading papers...</div>';

  try {
    const search = document.getElementById('searchInput').value;
    let url = `${API}/api/papers?limit=${LIMIT}&offset=${currentOffset}`;
    if (search) url += `&search=${encodeURIComponent(search)}`;
    if (currentFilter === 'doi') url += '&has_doi=true';

    const r = await fetch(url);
    const data = await r.json();
    const papers = data.papers || [];

    if (papers.length === 0) {
      grid.innerHTML = '<div class="empty">No papers found.</div>';
      return;
    }

    grid.innerHTML = papers.map(p => {
      const doi = p.doi;
      const zenodoUrl = p.zenodo_url;
      const badge = doi ? doiBadgeHTML(doi, zenodoUrl) : '';
      
      return `
        <div class="paper-card">
          <div class="paper-header">
            <a href="#" class="paper-title" onclick="showPaperDetail('${p.id}')">${escapeHtml(p.title || 'Untitled')}</a>
            ${badge}
          </div>
          <div class="paper-authors">${authorNames(p.authors)}</div>
          ${p.abstract ? `<div class="paper-abstract">${escapeHtml(p.abstract)}</div>` : ''}
          <div class="paper-meta">
            ${p.published ? `<span>Published: ${p.published}</span>` : ''}
            ${p.categories ? `<span>${p.categories.replace(/[\[\]"]/g,'')}</span>` : ''}
            ${doi ? `<a href="${zenodoUrl}" target="_blank" style="color:var(--zenodo);text-decoration:none;">📦 View on Zenodo</a>` : ''}
          </div>
        </div>
      `;
    }).join('');

    // Pagination
    const pg = document.getElementById('pagination');
    pg.innerHTML = `
      ${currentOffset > 0 ? `<button onclick="prevPage()" style="margin-right:1rem;padding:0.5rem 1rem;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text);cursor:pointer;">← Previous</button>` : ''}
      ${papers.length === LIMIT ? `<button onclick="nextPage()" style="padding:0.5rem 1rem;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text);cursor:pointer;">Next →</button>` : ''}
    `;
  } catch (err) {
    grid.innerHTML = `<div class="empty">Error loading papers: ${err.message}</div>`;
  }
}

// Load Zenodo publications
async function loadZenodo() {
  const list = document.getElementById('zenodoList');
  list.innerHTML = '<div class="loading">Loading Zenodo publications...</div>';

  try {
    const r = await fetch(`${API}/api/zenodo`);
    const dois = await r.json();

    if (dois.length === 0) {
      list.innerHTML = '<div class="empty">No Zenodo publications linked yet. Run the DOI population pipeline to link papers to their Zenodo records.</div>';
      return;
    }

    list.innerHTML = dois.map(d => `
      <div class="zenodo-card">
        <div class="zenodo-title">
          <a href="${d.zenodo_url}" target="_blank" style="color:var(--text);text-decoration:none;">
            📦 ${d.doi.replace('10.5281/zenodo.', '')}
          </a>
        </div>
        <a href="${d.zenodo_url}" target="_blank" class="zenodo-link">${d.zenodo_url}</a>
        <div class="zenodo-count">${d.paper_count} paper${d.paper_count !== 1 ? 's' : ''} linked</div>
      </div>
    `).join('');
  } catch (err) {
    list.innerHTML = `<div class="empty">Error: ${err.message}</div>`;
  }
}

// Paper detail
async function showPaperDetail(id) {
  try {
    const r = await fetch(`${API}/api/papers/${id}`);
    const p = await r.json();
    
    const doi = p.doi;
    const zenodoUrl = p.zenodo_url;
    
    alert([
      `Title: ${p.title}`,
      `Authors: ${authorNames(p.authors)}`,
      doi ? `DOI: ${doi}` : 'DOI: Not assigned',
      doi ? `Zenodo: ${zenodoUrl}` : '',
      '',
      p.abstract ? `Abstract: ${p.abstract.substring(0, 200)}...` : '',
    ].filter(Boolean).join('\n'));
  } catch (err) {
    alert('Error loading paper details');
  }
}

// Pagination
function nextPage() { currentOffset += LIMIT; loadPapers(); }
function prevPage() { currentOffset = Math.max(0, currentOffset - LIMIT); loadPapers(); }

// Escaping
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// Init
loadStats();
loadPapers();
</script>
</body>
</html>
